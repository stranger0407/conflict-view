spring:
  application:
    name: conflict-view-backend

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/conflictview}
    username: ${DATABASE_USERNAME:conflictview_user}
    password: ${DATABASE_PASSWORD:root}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=300s

server:
  port: ${PORT:8080}
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha

logging:
  level:
    com.conflictview: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN

# External API configuration
app:
  news-api:
    key: ${NEWS_API_KEY:}
    base-url: https://newsapi.org/v2
    enabled: ${NEWS_API_ENABLED:true}
  gdelt:
    base-url: https://api.gdeltproject.org/api/v2
    enabled: ${GDELT_ENABLED:true}
  youtube:
    key: ${YOUTUBE_API_KEY:}
    enabled: ${YOUTUBE_ENABLED:true}
  osint:
    enabled: ${OSINT_ENABLED:true}
  acled:
    key: ${ACLED_API_KEY:}
    email: ${ACLED_EMAIL:}
    enabled: ${ACLED_ENABLED:true}
  firms:
    key: ${NASA_FIRMS_KEY:}
    enabled: ${FIRMS_ENABLED:true}
  reliefweb:
    appname: ${RELIEFWEB_APPNAME:}
    enabled: ${RELIEFWEB_ENABLED:true}
  rss:
    enabled: ${RSS_ENABLED:true}
    feeds:
      # Major international
      bbc-world: https://feeds.bbci.co.uk/news/world/rss.xml
      bbc-middleeast: https://feeds.bbci.co.uk/news/world/middle_east/rss.xml
      bbc-africa: https://feeds.bbci.co.uk/news/world/africa/rss.xml
      bbc-asia: https://feeds.bbci.co.uk/news/world/asia/rss.xml
      bbc-latinamerica: https://feeds.bbci.co.uk/news/world/latin_america/rss.xml
      bbc-europe: https://feeds.bbci.co.uk/news/world/europe/rss.xml
      aljazeera: https://www.aljazeera.com/xml/rss/all.xml
      guardian-world: https://www.theguardian.com/world/rss
      france24-en: https://www.france24.com/en/rss
      dw-world: https://rss.dw.com/xml/rss-en-world
      # Middle East focused
      timesofisrael: https://www.timesofisrael.com/feed/
      middleeasteye: https://www.middleeasteye.net/rss
      # Africa focused
      africanews: https://www.africanews.com/feed/
      # Ukraine/Russia
      kyivindependent: https://kyivindependent.com/feed/
      # Conflict & security analysis
      reliefweb: https://reliefweb.int/updates/rss.xml
      crisisgroup: https://www.crisisgroup.org/latest-updates/feed
  scheduler:
    news-refresh-cron: "0 */15 * * * *"
    gdelt-sync-cron: "0 0 * * * *"
    osint-refresh-cron: "0 30 */6 * * *"
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
